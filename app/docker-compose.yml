version: '3.8'

services:
  web-app:
    image: cr.yandex/${REGISTRY_ID}/my-web-app:v1
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=5000
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge